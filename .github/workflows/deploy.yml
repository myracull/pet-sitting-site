name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate config.js from repository secrets
        run: |
          cat > js/config.js << 'EOF'
          const CONFIG = {
            BOOKING_ENDPOINT: "${{ secrets.BOOKING_ENDPOINT }}",
            BOOKING_TOKEN: "${{ secrets.BOOKING_TOKEN }}",
            AVAILABILITY_CSV_URL: "${{ secrets.AVAILABILITY_CSV_URL }}",
            RECAPTCHA_SITE_KEY: "6LddQ0wtAAAAANIyMehoQV6ju1YwLBfVD_zox0i_"
          };
          if (typeof window !== "undefined") {
            window.CONFIG = CONFIG;
          }
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload build as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4